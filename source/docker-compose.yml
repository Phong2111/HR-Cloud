services:
  # ─── SQL Server ─────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hrcloud-sqlserver
    environment:
      SA_PASSWORD: "HRCloud@123456"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - hrcloud-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "HRCloud@123456", "-Q", "SELECT 1", "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── MongoDB ────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: hrcloud-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hrcloud-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── SQL Init Service ───────────────────────────────────────────
  # Runs the init.sql script against SQL Server after it's healthy
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hrcloud-sql-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./init-scripts:/scripts
    networks:
      - hrcloud-network
    entrypoint: >
      bash -c "
        echo 'Waiting for SQL Server...' &&
        sleep 5 &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'HRCloud@123456' -C -i /scripts/init.sql &&
        echo '✅ Database initialized successfully'
      "
    restart: "no"

  # ─── Identity Service (Port 8081) ───────────────────────────────
  identity-service:
    build:
      context: ./backend
      dockerfile: identity-service/Dockerfile
    container_name: hrcloud-identity
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=HRCloud;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "HRCloud@123456"
      JWT_SECRET: hrcloud_super_secret_key_for_jwt_signing_must_be_256_bits_minimum_32_chars
      JWT_EXPIRATION_MS: "86400000"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - hrcloud-network
    restart: on-failure

  # ─── Organization Service (Port 8082) ────────────────────────────
  organization-service:
    build:
      context: ./backend
      dockerfile: organization-service/Dockerfile
    container_name: hrcloud-organization
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=HRCloud;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "HRCloud@123456"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - hrcloud-network
    restart: on-failure

  # ─── Leave Service (Port 8083) ───────────────────────────────────
  leave-service:
    build:
      context: ./backend
      dockerfile: leave-service/Dockerfile
    container_name: hrcloud-leave
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=HRCloud;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "HRCloud@123456"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    networks:
      - hrcloud-network
    restart: on-failure

  # ─── Recruitment Service (Port 8084) ─────────────────────────────
  recruitment-service:
    build:
      context: ./backend
      dockerfile: recruitment-service/Dockerfile
    container_name: hrcloud-recruitment
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/hrcloud_recruitment
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hrcloud-network
    restart: on-failure

  # ─── Frontend (Port 80) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_IDENTITY_URL: http://localhost:8081
        REACT_APP_ORG_URL: http://localhost:8082
        REACT_APP_LEAVE_URL: http://localhost:8083
        REACT_APP_RECRUIT_URL: http://localhost:8084
    container_name: hrcloud-frontend
    ports:
      - "80:80"
    depends_on:
      - identity-service
      - organization-service
      - leave-service
      - recruitment-service
    networks:
      - hrcloud-network

networks:
  hrcloud-network:
    driver: bridge

volumes:
  sqlserver_data:
  mongodb_data:

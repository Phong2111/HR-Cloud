server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend services
    location /api/auth/ {
        proxy_pass http://identity-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/staff {
        proxy_pass http://organization-service:8082;
        proxy_set_header Host $host;
    }

    location /api/org-chart {
        proxy_pass http://organization-service:8082;
        proxy_set_header Host $host;
    }

    location /api/dashboard {
        proxy_pass http://organization-service:8082;
        proxy_set_header Host $host;
    }

    location /api/leave {
        proxy_pass http://leave-service:8083;
        proxy_set_header Host $host;
    }

    location /api/candidates {
        proxy_pass http://recruitment-service:8084;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
